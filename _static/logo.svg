<svg width="360" height="150" viewBox="0 0 360 150" role="img"
     xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc">
  <title id="title">Annie</title>
  <desc id="desc">A detection-box bracket enclosing a green validation check, with the Annie wordmark.</desc>

  <!-- detection-box brackets -->
  <g fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M44 34 L44 18 L60 18"/>
    <path d="M116 18 L132 18 L132 34"/>
    <path d="M44 92 L44 108 L60 108"/>
    <path d="M116 108 L132 108 L132 92"/>
  </g>

  <!-- validation check -->
  <path d="M60 64 L80 84 L116 44" fill="none" stroke="#22c55e"
        stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- wordmark -->
  <text x="160" y="62" font-family="-apple-system, Segoe UI, sans-serif"
        font-size="44" font-weight="600" fill="#2dd4bf">Annie</text>
  <text x="161" y="92" font-family="-apple-system, Segoe UI, sans-serif"
        font-size="15" font-weight="400" fill="#94a3b8">annotate · inspect · validate</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Dataset tab with a segmentation CSV source configured">
  <rect width="900" height="520" fill="#f4f5f7"/>
  <!-- header -->
  <rect width="900" height="48" fill="#006d77"/>
  <text x="24" y="30" fill="#ffffff" font-size="18" font-weight="600">Annie</text>
  <g font-size="14" fill="#cde8ea">
    <text x="360" y="30">Convert</text>
    <text x="440" y="30" fill="#ffffff" font-weight="600">Dataset</text>
    <text x="530" y="30">Browse</text>
    <text x="610" y="30">Annotator</text>
  </g>

  <!-- Sources card -->
  <text x="24" y="82" font-size="16" font-weight="600" fill="#1c2430">Sources</text>
  <rect x="24" y="94" width="852" height="60" rx="8" fill="#ffffff" stroke="#e2e5ea"/>
  <circle cx="50" cy="124" r="10" fill="#006d77"/>
  <text x="72" y="120" font-size="14" font-weight="600" fill="#1c2430">Videos folder</text>
  <rect x="176" y="110" width="70" height="20" rx="10" fill="#2a9d8f"/>
  <text x="187" y="124" font-size="11" fill="#ffffff">Available</text>
  <text x="72" y="140" font-size="11" fill="#676D78">&lt;videos folder&gt; · 3218 videos</text>

  <rect x="24" y="162" width="852" height="72" rx="8" fill="#ffffff" stroke="#006d77" stroke-width="1.5"/>
  <circle cx="50" cy="198" r="10" fill="#006d77"/>
  <text x="72" y="188" font-size="14" font-weight="600" fill="#1c2430">Segmentation file</text>
  <rect x="214" y="178" width="70" height="20" rx="10" fill="#2a9d8f"/>
  <text x="225" y="192" font-size="11" fill="#ffffff">Available</text>
  <text x="72" y="208" font-size="11" fill="#676D78">review_band.csv · key: video_id · row id: segment_id</text>
  <text x="72" y="224" font-size="11" fill="#676D78">bands: cut (cut_start_sec/cut_end_sec), GT (gt_start_sec/gt_end_sec)</text>

  <!-- Tasks card -->
  <text x="24" y="270" font-size="16" font-weight="600" fill="#1c2430">Tasks</text>
  <text x="24" y="288" font-size="11" fill="#676D78">What each Annotator task needs — a task is offered once it is ready.</text>

  <rect x="24" y="300" width="852" height="46" rx="8" fill="#ffffff" stroke="#e2e5ea"/>
  <text x="50" y="328" font-size="18" fill="#2a9d8f">✓</text>
  <text x="76" y="328" font-size="14" font-weight="600" fill="#1c2430">Segment review</text>
  <rect x="220" y="312" width="66" height="22" rx="11" fill="#2a9d8f"/>
  <text x="230" y="327" font-size="11" fill="#ffffff">videos</text>
  <rect x="294" y="312" width="132" height="22" rx="11" fill="#2a9d8f"/>
  <text x="304" y="327" font-size="11" fill="#ffffff">segmentation CSV</text>
  <rect x="792" y="312" width="60" height="22" rx="11" fill="#2a9d8f"/>
  <text x="806" y="327" font-size="11" fill="#ffffff">Ready</text>

  <rect x="24" y="352" width="852" height="46" rx="8" fill="#ffffff" stroke="#e2e5ea"/>
  <text x="50" y="380" font-size="18" fill="#676D78">○</text>
  <text x="76" y="380" font-size="14" font-weight="600" fill="#1c2430">Protagonist review</text>
  <rect x="240" y="364" width="66" height="22" rx="11" fill="#2a9d8f"/>
  <text x="250" y="379" font-size="11" fill="#ffffff">videos</text>
  <rect x="314" y="364" width="122" height="22" rx="11" fill="#d90429"/>
  <text x="324" y="379" font-size="11" fill="#ffffff">protagonist CSV</text>
  <rect x="786" y="364" width="66" height="22" rx="11" fill="#676D78"/>
  <text x="794" y="379" font-size="11" fill="#ffffff">Not ready</text>

  <rect x="24" y="404" width="852" height="46" rx="8" fill="#ffffff" stroke="#e2e5ea"/>
  <text x="50" y="432" font-size="18" fill="#2a9d8f">✓</text>
  <text x="76" y="432" font-size="14" font-weight="600" fill="#1c2430">Curation</text>
  <rect x="180" y="416" width="66" height="22" rx="11" fill="#2a9d8f"/>
  <text x="190" y="431" font-size="11" fill="#ffffff">videos</text>
  <rect x="792" y="416" width="60" height="22" rx="11" fill="#2a9d8f"/>
  <text x="806" y="431" font-size="11" fill="#ffffff">Ready</text>
</svg>

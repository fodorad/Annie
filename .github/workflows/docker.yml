name: Docker

# Runs after the CD workflow (PyPI publish + GitHub Release) rather than directly
# on the tag, so the image is never pushed pointing at a version that failed to
# publish to PyPI. Manual dispatch is still available for ad-hoc rebuilds.
on:
  workflow_run:
    workflows: ["CD"]
    types: [completed]
  workflow_dispatch:

jobs:
  build-push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    # Skip unless the CD run succeeded (a failed/cancelled PyPI publish must not
    # yield a Docker image); manual dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v6
        with:
          # For workflow_run, check out the exact commit the CD run built.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0  # required for hatch-vcs git describe

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        # For a tag-triggered CD run, head_branch is the tag name (e.g. v1.2.3);
        # fall back to the ref name for manual dispatch.
        run: echo "tag=${{ github.event.workflow_run.head_branch || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            fodorad/annie:latest
            fodorad/annie:${{ steps.meta.outputs.tag }}

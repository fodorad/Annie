name: Docker

# Runs after the CD workflow (PyPI publish + GitHub Release) rather than directly
# on the tag, so the image is never pushed pointing at a version that failed to
# publish to PyPI. Manual dispatch (with an explicit tag) is available for ad-hoc
# rebuilds — e.g. to (re)build a past release without re-running CD.
on:
  workflow_run:
    workflows: ["CD"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and push (e.g. v1.0.0)"
        required: true

jobs:
  build-push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    # Skip unless the CD run succeeded (a failed/cancelled PyPI publish must not
    # yield a Docker image); manual dispatch always runs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolve version
        id: meta
        # workflow_dispatch → the input tag; workflow_run for a tag push →
        # head_branch is the tag name (e.g. v1.0.0). `version` strips the leading v.
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          tag="${INPUT_TAG:-$HEAD_BRANCH}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.event.workflow_run.head_sha }}
          fetch-depth: 0  # required for hatch-vcs git describe

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            ANNIE_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            fodorad/annie:latest
            fodorad/annie:${{ steps.meta.outputs.version }}

services:
  annie:
    build: .
    image: annie:latest
    ports:
      - "${ANNIE_PORT:-8080}:8080"
    volumes:
      # Annie state: logs, session DBs, render cache, user-saved configs.
      # Defaults to ./annie-home/ next to this file (accessible from Finder/Explorer).
      # Override in .env: ANNIE_HOME_HOST=/your/preferred/path
      - "${ANNIE_HOME_HOST:-./annie-home}:/annie-home"

      # ── Data directories from your HDDs ──────────────────────────────────────
      # Set matching variables in .env, then uncomment the lines you need.
      # The protagonist directory must NOT be read-only: the Annotator's Export
      # writes the corrected CSV as a sibling next to the protagonist file.
      #
      # - "${ANNIE_VIDEO_DIR}:/data/video:ro"
      # - "${ANNIE_VDET_DIR}:/data/vdet:ro"
      # - "${ANNIE_TRACK_DIR}:/data/track:ro"
      # - "${ANNIE_PROTAGONIST_DIR}:/data/protagonist"
    environment:
      ANNIE_HOST: "0.0.0.0"
      ANNIE_PORT: "${ANNIE_PORT:-8080}"
      ANNIE_HOME: /annie-home
      # User-saved configs are written here and auto-discovered on the next start.
      ANNIE_CONFIG_DIR: /annie-home/configs

      # Container-side paths (fixed). Uncomment each line together with the
      # matching volume mount above.
      # ANNIE_VIDEO_DIR: /data/video
      # ANNIE_VDET_DIR: /data/vdet
      # ANNIE_TRACK_DIR: /data/track
      # ANNIE_PROTAGONIST_CSV: /data/protagonist/${ANNIE_PROTAGONIST_CSV_NAME:-protagonist_track_heuristic.csv}
    restart: unless-stopped
